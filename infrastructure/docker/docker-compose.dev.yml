version: '3.8'

# Development-specific overrides
services:
  postgres:
    ports:
      - "5435:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust

  redis:
    ports:
      - "6385:6379"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  frontend:
    command: npm run dev -- --turbo
    environment:
      - NODE_ENV=development
